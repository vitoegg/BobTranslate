name: Release BobTranslate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-bobplugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Build plugins
        run: ./scripts/package.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s\n%s\n' \
            '🚀 🚀 🚀' \
            'A Bob translation plugin supporting OpenAI and Fireworks models with non-reasoning mode.' \
            > release-notes.md

          gh release create "$GITHUB_REF_NAME" \
            dist/openai-bob-translate.bobplugin \
            dist/fireworks-bob-translate.bobplugin \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md

      - name: Update appcast
        run: node scripts/update-appcast.js

      - name: Commit appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast/openai.json appcast/fireworks.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: update appcast for $GITHUB_REF_NAME"
            git push origin HEAD:main
          fi
